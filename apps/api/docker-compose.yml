# Lives at /opt/collab/docker-compose.yml on the EC2 (written by the deploy workflow
# on every push). This file in the repo is the source of truth.
#
# Deploy flow (executed via SSM from GitHub Actions):
#   1. Write this file → /opt/collab/docker-compose.yml
#   2. Fetch DATABASE_URL from SSM → /opt/collab/.env
#   3. docker compose pull            (refresh the api image from ECR)
#   4. docker compose run --rm --no-deps api alembic upgrade head    (migrations)
#   5. docker compose up -d           (recreates api; redis stays running)

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - collab-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    image: 182399698691.dkr.ecr.ap-south-1.amazonaws.com/collab-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - collab-net

networks:
  collab-net:

volumes:
  redis-data:
