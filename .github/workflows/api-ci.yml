name: api-ci

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

defaults:
  run:
    working-directory: apps/api

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: collab
          POSTGRES_PASSWORD: collab
          POSTGRES_DB: collab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collab -d collab"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://collab:collab@localhost:5432/collab
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run migrations (verify alembic scripts are valid)
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: collab-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
