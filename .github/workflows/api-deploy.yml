# Deploys apps/api to AWS.
#
# Prerequisites (none of this exists yet — set up in order before enabling):
#   1. Personal AWS account.
#   2. ECR repository (e.g. "collab-api") in your chosen region.
#   3. GitHub OIDC identity provider registered in IAM.
#   4. IAM role (e.g. "github-collab-deploy") trusted by that OIDC provider,
#      scoped to repo:<your-user>/collab-app:ref:refs/heads/main.
#      Permissions: ecr:* on the repo, ssm:SendCommand on the EC2 instance.
#   5. EC2 instance running Docker + SSM agent, in a public subnet,
#      with an instance profile allowing ECR pull and SSM parameter read.
#
# Then set the following in GitHub:
#   Secrets:  (none — OIDC means no long-lived keys)
#   Variables:
#     AWS_REGION              e.g. us-east-1
#     AWS_ACCOUNT_ID          12-digit account id
#     AWS_DEPLOY_ROLE_ARN     arn:aws:iam::<acct>:role/github-collab-deploy
#     ECR_REPOSITORY          collab-api
#     EC2_INSTANCE_ID         i-0abc...
#
# Until those exist, this workflow is intentionally gated to manual dispatch.

name: api-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-deploy.yml"

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy on EC2 via SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Ship the compose file base64-encoded so we don't fight quoting
          # through YAML → JSON → shell layers.
          COMPOSE_B64=$(base64 -w0 apps/api/docker-compose.yml)

          jq -n \
            --arg b64 "$COMPOSE_B64" \
            --arg region "$AWS_REGION" \
            --arg account "$AWS_ACCOUNT_ID" \
            '{
              commands: [
                "set -euo pipefail",
                "mkdir -p /opt/collab",
                "cd /opt/collab",
                ("echo " + $b64 + " | base64 -d > /opt/collab/docker-compose.yml"),
                # Fetch DATABASE_URL from SSM (EC2 instance role has /collab/* read perms).
                ("DATABASE_URL=$(aws ssm get-parameter --name /collab/prod/database_url --with-decryption --query Parameter.Value --output text --region " + $region + ")"),
                "umask 077",
                "printf '\''DATABASE_URL=%s\\n'\'' \"$DATABASE_URL\" > /opt/collab/.env",
                ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $account + ".dkr.ecr." + $region + ".amazonaws.com"),
                "docker compose pull",
                # One-shot migration container. --no-deps avoids spinning redis just for alembic.
                "docker compose run --rm --no-deps api alembic upgrade head",
                "docker compose up -d"
              ]
            }' > /tmp/ssm-params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy collab-api $GITHUB_SHA" \
            --parameters file:///tmp/ssm-params.json \
            --cloud-watch-output-config CloudWatchOutputEnabled=false \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM CommandId: $CMD_ID"

          # Wait for the EC2 to actually finish running the command, then fail
          # the workflow if status != Success. aws ssm wait returns non-zero on
          # terminal failure, so we trap it and still fetch the invocation
          # output for the logs.
          set +e
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION"
          WAIT_RC=$?
          set -e

          INV_JSON=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION" \
            --output json)

          STATUS=$(jq -r '.Status' <<<"$INV_JSON")
          echo "=== SSM Status: $STATUS ==="
          echo "--- stdout ---"
          jq -r '.StandardOutputContent' <<<"$INV_JSON"
          echo "--- stderr ---"
          jq -r '.StandardErrorContent' <<<"$INV_JSON"

          if [ "$STATUS" != "Success" ] || [ "$WAIT_RC" -ne 0 ]; then
            echo "::error::Deploy failed on EC2 (status=$STATUS, wait_rc=$WAIT_RC)"
            exit 1
          fi
