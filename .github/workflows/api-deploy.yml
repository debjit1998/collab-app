# Deploys apps/api to AWS.
#
# Prerequisites (none of this exists yet — set up in order before enabling):
#   1. Personal AWS account.
#   2. ECR repository (e.g. "collab-api") in your chosen region.
#   3. GitHub OIDC identity provider registered in IAM.
#   4. IAM role (e.g. "github-collab-deploy") trusted by that OIDC provider,
#      scoped to repo:<your-user>/collab-app:ref:refs/heads/main.
#      Permissions: ecr:* on the repo, ssm:SendCommand on the EC2 instance.
#   5. EC2 instance running Docker + SSM agent, in a public subnet,
#      with an instance profile allowing ECR pull and SSM parameter read.
#
# Then set the following in GitHub:
#   Secrets:  (none — OIDC means no long-lived keys)
#   Variables:
#     AWS_REGION              e.g. us-east-1
#     AWS_ACCOUNT_ID          12-digit account id
#     AWS_DEPLOY_ROLE_ARN     arn:aws:iam::<acct>:role/github-collab-deploy
#     ECR_REPOSITORY          collab-api
#     EC2_INSTANCE_ID         i-0abc...
#
# Until those exist, this workflow is intentionally gated to manual dispatch.

name: api-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-deploy.yml"

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy on EC2 via SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Base64-encode the compose file so we can ship it inside the SSM
          # command without worrying about YAML/JSON/shell quoting.
          COMPOSE_B64=$(base64 -w0 apps/api/docker-compose.yml)

          # SSM command parameters — kept in a file so we don't fight the shell.
          jq -n \
            --arg b64 "$COMPOSE_B64" \
            --arg region "$AWS_REGION" \
            --arg account "$AWS_ACCOUNT_ID" \
            '{
              commands: [
                "set -euo pipefail",
                "mkdir -p /opt/collab",
                ("echo " + $b64 + " | base64 -d > /opt/collab/docker-compose.yml"),
                "cd /opt/collab",
                ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $account + ".dkr.ecr." + $region + ".amazonaws.com"),
                "docker compose pull",
                "docker compose up -d"
              ]
            }' > /tmp/ssm-params.json

          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy collab-api $GITHUB_SHA" \
            --parameters file:///tmp/ssm-params.json \
            --output text
